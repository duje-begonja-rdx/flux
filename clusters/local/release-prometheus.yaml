---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kps
  namespace: monitoring
spec:
  interval: 10m
  releaseName: kps
  targetNamespace: monitoring
  chart:
    spec:
      interval: 60m
      chart: kube-prometheus-stack
      version: 82.4.3
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: helm-repos
  values:
    fullnameOverride: "kps"
    defaultRules:
      rules:
        kubeScheduler: false
        kubeSchedulerAlerting: false
        kubeSchedulerRecording: false
        etcd: false
        kubeStateMetrics: false
        kubeApiserverAvailability: false
      disabled:
        KubeletPodStartUpLatencyHigh: true
        KubeletTooManyPods: true
        KubeMemoryOvercommit: true
        KubeCPUOvercommit: true
        InfoInhibitor: true
        KubeAPIErrorBudgetBurn: true
    kubelet:
      enabled: true
      serviceMonitor:
        https: true
        resource: false
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeApiServer:
      enabled: false
    prometheus:
      prometheusSpec:
        externalLabels:
          cluster: "minikube"
        scrapeInterval: 15s
        # Monitor all namespaces for rules, serviceMonitors and probes.
        ruleSelector: {}
        ruleNamespaceSelector: {}
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelector: {}
        serviceMonitorNamespaceSelector: {}
        serviceMonitorSelectorNilUsesHelmValues: false
        probeSelector: {}
        probeNamespaceSelector: {}
        probeSelectorNilUsesHelmValues: false
        replicas: 1
        retention: "6w"
        retentionSize: "20GB"
      # ingress:
      #   pathType: ImplementationSpecific
      #   enabled: true
      #   ingressClassName: nginx
    prometheusOperator: {}
      # prometheusConfigReloader:
      #   # resources: 
      #   #   requests:
      #   #     cpu: 50m
    grafana:
      enabled: true
      adminPassword: Admin12345
      defaultDashboardsEnabled: true
      # prometheus-grafana pod hangs on update with "Multi-Attach error for #
      # volume", because it's default deploymentStrategy is RollingUpdate,
      # which # doesn't work with deployments with persistent volumes.
      deploymentStrategy:
        type: Recreate

      service:
        type: NodePort
        nodePort: 32000

      serviceMonitor:
        enabled: true
        interval: 15s
        scrapeTimeout: 15s

      additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: 'http://loki:3100'

      persistence:
        enabled: false
    alertmanager:
      enabled: true

      alertmanagerSpec:
        replicas: 1
