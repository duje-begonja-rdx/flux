apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: loki-helm-repository
  namespace: monitoring
spec:
  interval: 20m
  url: https://grafana.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: promtail
  namespace: monitoring
spec:
  interval: 20m
  releaseName: promtail
  targetNamespace: monitoring
  chart:
    spec:
      interval: 20m
      chart: promtail
      version: 6.15.5
      sourceRef:
        kind: HelmRepository
        name: loki-helm-repository
        namespace: monitoring
  values:
    enabled: true
    image:
      tag: 2.9.4
    tolerations:
    - operator: "Exists"
    extraArgs:
    - -config.expand-env=true
    config:
      logLevel: info
      readinessProbe: {}
      clients:
        - url: http://loki-write.monitoring.svc.cluster.local:3100/loki/api/v1/push
          external_labels:
            cluster: rtlj-prod
            env: prod
      snippets:
        pipelineStages:
          - cri: {}
          - drop:
              expression: "(.*SSL certificate.*self-signed.*)"
        extraRelabelConfigs:
          - action: keep
            regex: (.*ng-.*|.*promtail.*|.*signaling.*|.*nginx.*|.*loki.*|.*dashboard.*|external-dns-cloudflare.*|dapps.*|gumball-club.*|radquest.*|radix-connect-relay.*|cloudwatch-exporter|cnpg-cluster-.*|airflow.*|xrd-supply-.*|incentives.*|idos.*|metabase.*)
            source_labels:
            - __meta_kubernetes_namespace
            - __meta_kubernetes_pod_name
