{{- if and .Values.serviceMonitor.enabled .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ethereum-component.metricsServiceName" . }}
  labels:
    {{- include "ethereum-component.componentLabels" (dict "context" . "Chart" .Chart "Values" .Values "Release" .Release) | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "ethereum-component.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: {{ include "ethereum-component.name" . }}
  ports:
    - name: metrics
      port: {{ .Values.metrics.servicePort }}
      targetPort: {{ .Values.metrics.portName }}
{{- end }}
